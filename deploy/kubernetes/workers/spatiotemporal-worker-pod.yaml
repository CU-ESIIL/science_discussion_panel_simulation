apiVersion: v1
kind: Pod
metadata:
  name: scienceclaw-spatiotemporal-worker-template
  namespace: scienceclaw
  labels:
    app.kubernetes.io/name: scienceclaw
    scienceclaw.esl/template: worker-pod
spec:
  serviceAccountName: scienceclaw-job-runner
  restartPolicy: Never
  containers:
    - name: worker
      image: ghcr.io/cu-esiil/openclaw_container/spatiotemporal-worker:latest
      args: ["--task", "/task/task.yaml"]
      resources:
        requests:
          cpu: "500m"
          memory: 1Gi
        limits:
          cpu: "2"
          memory: 4Gi
      volumeMounts:
        - name: scienceclaw-data
          mountPath: /data
        - name: task-config
          mountPath: /task
          readOnly: true
  volumes:
    - name: scienceclaw-data
      persistentVolumeClaim:
        claimName: scienceclaw-data
    - name: task-config
      configMap:
        name: scienceclaw-task-config
