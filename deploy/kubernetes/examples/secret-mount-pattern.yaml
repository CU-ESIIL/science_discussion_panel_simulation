apiVersion: v1
kind: Secret
metadata:
  name: scienceclaw-worker-env
  namespace: scienceclaw
type: Opaque
stringData:
  EXAMPLE_API_TOKEN: replace-with-local-secret-manager
---
apiVersion: v1
kind: Pod
metadata:
  name: scienceclaw-secret-mount-pattern
  namespace: scienceclaw
spec:
  restartPolicy: Never
  containers:
    - name: worker
      image: ghcr.io/cu-esiil/openclaw_container/spatiotemporal-worker:latest
      envFrom:
        - secretRef:
            name: scienceclaw-worker-env
      args: ["--task", "/task/task.yaml"]
  # This is a pattern only. Prefer external secret managers in shared clusters.
