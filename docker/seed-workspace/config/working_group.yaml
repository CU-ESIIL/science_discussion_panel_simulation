# Local panel configuration copied from the OASIS Scientific Discussion Panel template.
# The filename is retained for compatibility with older scripts.

panel:
  title: "OASIS Scientific Discussion Panel"
  theme: "AI for Ecology: Accelerating Discoveries, Reducing Uncertainties, and Scaling Solutions"
  default_landing: "PANEL_BRIEF.md"
  architecture: "Scientific Panel Digital Twin"
  default_human_interface: "Cibele Amaral (Moderator)"
  status: "paused"
  structured_minutes_required: true
  dashboard_events_required: true

agents:
  moderator:
    - "Cibele Amaral"
  panelists:
    - "Tanya Berger-Wolf"
    - "Lauren Gillespie"
    - "Jenna Kline"
    - "Justin Kitzes"
    - "Katherine Siegel"
    - "Ty Tuff"
  organizer:
    - "Jennifer Balch"
  support:
    - "Discussion Intelligence Agent"

discussion_loop:
  autorun: false
  interval_minutes: 60
  max_turns_per_round: 16
  max_panelists_per_round: 6
  max_research_tasks_per_round: 2
  max_experiments_per_day: 1
  require_experiment_approval: true
  idle_when_no_topic: true
  timezone: "America/Denver"
  required_flow:
    - "moderator_introduces_topic"
    - "moderator_asks_opening_question"
    - "panelists_respond_independently"
    - "panelists_react_to_each_other"
    - "clarifying_questions"
    - "respectful_challenges"
    - "identify_agreement"
    - "identify_disagreement"
    - "identify_missing_evidence"
    - "suggest_future_work"
    - "produce_written_report"

integrations:
  slack:
    enabled: false
    notes: "Slack should talk to Cibele as Moderator, not directly to execution agents."
  verde:
    enabled: true
    notes: "AI-VERDE endpoint and key remain configurable through env or mounted secret files."
  github:
    enabled: true
    notes: "GitHub remains the control plane and selected repository manager."

safety:
  no_impersonation: true
  public_expertise_only: true
  no_final_consensus_required: true
  append_only_records:
    - "DISCUSSION_ROUNDS/"
    - "POSITION_HISTORY/"
    - "FACT_CHECKS/"
    - "EXPERIMENTS/"
  human_approval_required_for:
    - "publishing"
    - "deleting files"
    - "pushing to GitHub"
    - "new mounts"
    - "billed APIs"
    - "expensive experiments"
    - "sensitive public claims"
