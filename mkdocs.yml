site_name: "OASIS Scientific Discussion Panel"
site_description: "A public summary of a simulated scientific panel discussing AI for ecology."

nav:
  - Home: index.md
  - The Panel: panel-architecture.md
  - Current Discussion: reports/latest-discussion.md
  - Discussion Summary: dashboard/discussion-dashboard.md
  - Discussion Log: reports/panel-discussion-log.md

theme:
  name: material
  logo: assets/brand/scienceclaw.png
  favicon: assets/brand/scienceclaw.png
  palette:
    primary: custom
    accent: custom
  features:
    - navigation.sections
    - navigation.top

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

plugins:
  - search
