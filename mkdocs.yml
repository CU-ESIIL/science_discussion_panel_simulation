site_name: "OASIS Scientific Discussion Panel"
site_description: "A persistent evidence-based scientific forum for AI in ecology, powered by OpenClaw."

nav:
  - Home: index.md
  - Start Here:
      - Overview: start-here/index.md
      - What is OpenClaw?: start-here/what-is-openclaw.md
      - First 10 Minutes: start-here/first-10-minutes.md
      - Choose Your Path: start-here/user-paths.md
  - Use OpenClaw:
      - Launch Locally: use/launch-locally.md
      - Workspace File Manager: workspace-file-manager.md
      - GitHub Repository Manager: github-repository-manager.md
      - Where Files Go: use/where-files-go.md
      - Tasks, Decisions, Checkpoints: use/tasks-decisions-checkpoints.md
      - Troubleshooting: troubleshooting.md
  - Scientific Discussion Panel:
      - Overview: panel-architecture.md
      - Panelists: panelists.md
      - Latest Discussion: reports/latest-discussion.md
      - Discussion Dashboard: dashboard/discussion-dashboard.md
      - Discussion Coding Protocol: discussion-coding-protocol.md
      - Moderator and Support Agents: moderator-and-support-agents.md
      - Panel Constitution: panel-constitution.md
      - Persistent Discussion Loop: persistent-discussion-loop.md
      - Asking the Panel Questions: asking-the-panel.md
      - Evidence and Citations: evidence-and-citations.md
      - Experiments: experiments.md
      - Memory and Discussion Records: memory-and-discussion-records.md
      - AI-VERDE Configuration: ai-verde-configuration.md
      - Secret Migration: secret-migration.md
      - Resource Limits: resource-limits.md
      - Security and Human Oversight: security-and-human-oversight.md
      - Legacy Template Notes: oasis-template.md
  - Data and Storage:
      - Storage Model: storage-model.md
      - Local Mounts: storage/local-mounts.md
      - Remote Storage: storage/remote-storage.md
      - Stream-First Data: storage/stream-first-data.md
      - Storage Secrets: storage/secrets.md
  - Maintainer / Advanced:
      - Architecture: architecture.md
      - Setup: setup.md
      - Operations: operations.md
      - Security: security.md
      - Model Routing: model-routing.md
      - Slack Integration: slack-integration.md
      - Kubernetes Workers: kubernetes-workers.md
      - Distributed Runtime: distributed-runtime.md
      - Workspace CMS: workspace-cms.md
      - Glossary: reference/glossary.md

theme:
  name: material
  logo: assets/brand/scienceclaw.png
  favicon: assets/brand/scienceclaw.png
  palette:
    primary: custom
    accent: custom
  features:
    - navigation.sections
    - navigation.top

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

plugins:
  - search
