# OASIS Scientific Discussion Panel template configuration.
#
# The filename is retained for backward compatibility with existing launch
# scripts. User-facing copy should use "scientific discussion panel" or
# "scientific forum" rather than "working group."

project:
  title: "OASIS Scientific Discussion Panel"
  short_title: "ScienceClaw Panel"
  subtitle: "Persistent AI-for-ecology scientific forum"
  mission: "Maintain a durable, evidence-based Scientific Panel Digital Twin that reasons, documents, critiques, remembers, and improves shared understanding."
  lifecycle_state: "active-template"
  repository: "CU-ESIIL/science_discussion_panel_simulation"
  branch: "main"
  powered_by: "OpenClaw"

branding:
  enabled: true
  project_title: "OASIS Scientific Discussion Panel"
  short_title: "ScienceClaw Panel"
  subtitle: "Persistent AI-for-ecology scientific forum"
  icon: "docs/assets/brand/scienceclaw.png"
  hero_image: "docs/assets/brand/scienceclaw.png"
  primary_color: "#234A65"
  accent_blue: "#42BCDC"
  accent_green: "#007135"
  body_text: "#161A19"
  relief_gray: "#E3E3E3"
  tone:
    - evidence-based
    - scientific
    - deliberative
    - reproducible
    - human-supervised

workspace:
  repository_role: "control-plane-and-public-memory"
  container_role: "replaceable-runtime"
  workspace_mount: "/workspace"
  data_root: "/data"
  external_storage_root: "/external_storage"
  default_landing: "PANEL_BRIEF.md"
  append_only_records:
    - "DISCUSSION_ROUNDS/"
    - "POSITION_HISTORY/"
    - "FACT_CHECKS/"
    - "EXPERIMENTS/"
  current_state_files:
    - "CURRENT_SYNTHESIS.md"
    - "CURRENT_POSITIONS.md"
    - "DISAGREEMENT_MAP.md"
    - "SYSTEM_STATUS.md"

agents:
  user_facing_default: "main"
  human_review_required: true
  tiers:
    moderator:
      - "Cibele Amaral"
    panelists:
      - "Tanya Berger-Wolf"
      - "Lauren Gillespie"
      - "Jenna Kline"
      - "Justin Kitzes"
      - "Katherine Siegel"
      - "Ty Tuff"
    organizer:
      - "Jennifer Balch"
    support:
      - "Discussion Intelligence Agent"

integrations:
  slack:
    enabled: false
    user_facing_component: "Cibele Amaral as Moderator only"
  github:
    enabled: true
    role: "control-plane"
  openclaw:
    enabled: true
    role: "gateway-and-agent-runtime"
  verde:
    enabled: true
    role: "first-class configurable OpenAI-compatible provider"
  external_storage:
    enabled: false
    role: "large-source-material shelf"

workflow_modes:
  panel_intake: true
  constitution_formation: true
  persistent_discussion_loop: true
  structured_minutes: true
  semantic_tagging: true
  dashboard_event_exports: true
  evidence_curation: true
  bounded_experiments: true
  checkpoint: true
  spatial_temporal_runtime: true
  kubernetes_optional: true
  publication_pipeline: false

resource_controls:
  autorun_default: false
  discussion_interval_minutes: 60
  max_turns_per_round: 16
  max_panelists_per_round: 6
  max_research_tasks_per_round: 2
  max_experiments_per_day: 1
  require_experiment_approval: true
  idle_when_no_topic: true

safety:
  simulation_disclosure_required: true
  no_impersonation: true
  public_expertise_only: true
  no_final_consensus_required: true
  agents_may_recommend_humans_approve: true
  require_human_approval_for:
    - "publishing"
    - "deleting files"
    - "pushing to GitHub"
    - "installing third-party skills"
    - "mounting new host folders"
    - "external API use with billing implications"
    - "expensive or long-running experiments"
    - "claims about communities, Tribes, Indigenous knowledge, public health, law, or policy"
